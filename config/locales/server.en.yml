en:
  site_settings:
    community_integrations_enabled: "Enable community platform integrations"

    # ── Twitch ────────────────────────────────────────────────────────────────
    community_integrations_twitch_client_id: "Twitch application Client ID"
    community_integrations_twitch_client_secret: "Twitch application Client Secret"
    community_integrations_twitch_broadcaster_id: >
      Twitch numeric broadcaster (channel) ID to check subscriptions against.
      This is a number, NOT a username. Find it at
      https://api.twitch.tv/helix/users?login=YOUR_USERNAME using any app token,
      or use https://www.streamweasels.com/tools/convert-twitch-username-to-user-id/
    community_integrations_twitch_subscriber_group: "Discourse group name for active Twitch subscribers"

    # ── GitHub Sponsors ───────────────────────────────────────────────────────
    community_integrations_github_sponsors_target_username: >
      GitHub username whose sponsor list will be checked.
      Users who are actively sponsoring this account receive the GitHub Sponsors group.
    community_integrations_github_sponsors_group: "Discourse group name for active GitHub Sponsors"

    # ── YouTube Members ───────────────────────────────────────────────────────
    community_integrations_youtube_client_id: >
      Google OAuth2 Client ID for the YouTube connect flow.
      Only youtube.readonly scope is needed — no restricted scopes required.
      Enable YouTube Data API v3 in your GCP project.
    community_integrations_youtube_client_secret: "Google OAuth2 Client Secret for the YouTube connect flow"
    community_integrations_youtube_members_csv: >
      Paste the raw CSV exported from YouTube Studio → Earn → Members → Export.
      The plugin reads each member's channel ID from the "Link to profile" column
      and cross-references it when users connect their YouTube account.
      Re-export and update this field periodically (e.g. weekly) to keep
      group membership accurate.
    community_integrations_youtube_member_group: "Discourse group name for active YouTube channel members"

    # ── Right sidebar ────────────────────────────────────────────────────────
    community_integrations_gamification_leaderboard_id: >-
      Gamification leaderboard ID to display in the right sidebar.
      Set to 0 to hide the leaderboard block.
      Find the ID in Admin → Plugins → Gamification (shown in the URL when editing a leaderboard).
    community_integrations_sidebar_category_ids: >-
      Comma-separated category IDs to display in the right sidebar category list.
      Leave blank to show all top-level categories.

    # ── Sync schedule ─────────────────────────────────────────────────────────
    community_integrations_sync_interval_hours: >
      How often (in hours) to re-verify all linked accounts in the background.
      Lower values keep memberships more accurate at the cost of more API calls.
      YouTube default quota is 10,000 units/day — keep this at 6+ hours with
      large user bases to stay within quota.
